backend:
  name: github
  repo: sirprikkel/mijnkoelpietje-website
  branch: main
  base_url: https://sveltia-cms-auth.pimmetjelieshout.workers.dev

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "verhalen"
    label: "Verhalen"
    label_singular: "Verhaal"
    folder: "content/verhalen"
    create: true
    slug: "{{slug}}"
    identifier_field: titel
    format: json
    fields:
      - {label: "Titel", name: "titel", widget: "string"}
      - {label: "Rubriek", name: "rubriek", widget: "select", options: [
          {label: "Ondergronds", value: "ondergronds"},
          {label: "Bovengronds", value: "bovengronds"},
          {label: "De Sporen", value: "de-sporen"},
          {label: "Knipoog", value: "knipoog"},
          {label: "De Stem", value: "de-stem"}
        ]}
      - {label: "Datum", name: "datum", widget: "string", hint: "Bijv: 12 januari 2026"}
      - {label: "Korte intro (voor kaart)", name: "intro", widget: "text"}
      - {label: "Volledige tekst", name: "tekst", widget: "markdown"}
      - {label: "Afbeelding (optioneel)", name: "afbeelding", widget: "image", required: false}
      - {label: "Afbeelding formaat", name: "afbeelding_formaat", widget: "select", required: false, default: "liggend", options: [
          {label: "Liggend (landscape)", value: "liggend"},
          {label: "Staand (portrait)", value: "staand"},
          {label: "Vierkant (square)", value: "vierkant"}
        ]}
      - {label: "Link (optioneel)", name: "link", widget: "string", required: false, hint: "URL naar externe pagina, bijv: https://www.voorbeeld.nl"}

  - name: "kunstwerken"
    label: "Kunstwerken (Shop)"
    label_singular: "Kunstwerk"
    folder: "content/kunstwerken"
    create: true
    slug: "{{slug}}"
    identifier_field: titel
    format: json
    fields:
      - {label: "Titel", name: "titel", widget: "string"}
      - {label: "Collectie", name: "collectie", widget: "string", hint: "Bijv: Kanarie Serie"}
      - {label: "Beschrijving", name: "beschrijving", widget: "markdown"}
      - {label: "Prijs (€)", name: "prijs", widget: "string"}
      - {label: "Editie", name: "editie", widget: "string", hint: "Bijv: 1 van 12"}
      - {label: "Afbeelding", name: "afbeelding", widget: "image", required: false}
      - {label: "Afbeelding formaat", name: "afbeelding_formaat", widget: "select", required: false, default: "liggend", options: [
          {label: "Liggend (landscape)", value: "liggend"},
          {label: "Staand (portrait)", value: "staand"},
          {label: "Vierkant (square)", value: "vierkant"}
        ]}
      - {label: "Mollie betaallink", name: "mollie_link", widget: "string", required: false, hint: "Plak hier je Mollie betaallink"}
      - {label: "Link (optioneel)", name: "link", widget: "string", required: false, hint: "URL naar externe pagina, bijv: https://www.voorbeeld.nl"}

  - name: "sponsoren"
    label: "Vrienden & Sponsoren"
    label_singular: "Sponsor"
    folder: "content/sponsoren"
    create: true
    slug: "{{slug}}"
    identifier_field: naam
    format: json
    fields:
      - {label: "Naam", name: "naam", widget: "string"}
      - {label: "Omschrijving", name: "omschrijving", widget: "text", required: false}
      - {label: "Website", name: "website", widget: "string", required: false, hint: "Bijv: https://www.voorbeeld.nl"}
      - {label: "Logo", name: "logo", widget: "image", required: false}

  - name: "activiteiten"
    label: "Activiteiten"
    label_singular: "Activiteit"
    folder: "content/activiteiten"
    create: true
    slug: "{{slug}}"
    identifier_field: titel
    format: json
    fields:
      - {label: "Titel", name: "titel", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Tentoonstelling", "Lezing", "Workshop", "Evenement", "Anders"]}
      - {label: "Datum", name: "datum", widget: "string", hint: "Bijv: 12 april 2026"}
      - {label: "Beschrijving", name: "beschrijving", widget: "markdown"}
      - {label: "Locatie", name: "locatie", widget: "string", hint: "Bijv: Museum Valkenburg · 10:00–17:00"}
      - {label: "Afbeelding (optioneel)", name: "afbeelding", widget: "image", required: false}
      - {label: "Afbeelding formaat", name: "afbeelding_formaat", widget: "select", required: false, default: "liggend", options: [
          {label: "Liggend (landscape)", value: "liggend"},
          {label: "Staand (portrait)", value: "staand"},
          {label: "Vierkant (square)", value: "vierkant"}
        ]}
      - {label: "Link (optioneel)", name: "link", widget: "string", required: false, hint: "URL naar externe pagina, bijv: https://www.voorbeeld.nl/evenement"}

  - name: "shop-instellingen"
    label: "Shop Instellingen"
    files:
      - name: "bundel"
        label: "Bundel Aanbieding"
        file: "content/shop-instellingen/bundel.json"
        format: json
        fields:
          - {label: "Titel", name: "titel", widget: "string"}
          - {label: "Label (bijv. Bestseller)", name: "label", widget: "string"}
          - {label: "Beschrijving", name: "beschrijving", widget: "text"}
          - {label: "Prijs (€)", name: "prijs", widget: "string"}
          - {label: "Oude prijs (€, optioneel)", name: "oude_prijs", widget: "string", required: false}
          - {label: "Korting tekst (bijv. -34%)", name: "korting", widget: "string", required: false}
          - {label: "Knop tekst", name: "knop_tekst", widget: "string", default: "Bundel kopen"}
          - {label: "Mollie betaallink", name: "mollie_link", widget: "string", required: false, hint: "Plak hier je Mollie betaallink"}
          - {label: "Tonen op website", name: "tonen", widget: "boolean", default: true}

  - name: "nieuws"
    label: "Nieuws"
    label_singular: "Nieuwsbericht"
    folder: "content/nieuws"
    create: true
    slug: "{{slug}}"
    identifier_field: titel
    format: json
    fields:
      - {label: "Titel", name: "titel", widget: "string"}
      - {label: "Categorie", name: "categorie", widget: "string", hint: "Bijv: Collectie, Website, Evenement"}
      - {label: "Datum", name: "datum", widget: "string"}
      - {label: "Tekst", name: "tekst", widget: "markdown"}
      - {label: "Link (optioneel)", name: "link", widget: "string", required: false, hint: "URL naar externe pagina, bijv: https://www.voorbeeld.nl"}
